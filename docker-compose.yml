services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY}
      TBANK_TERMINAL_PASSWORD: ${TBANK_TERMINAL_PASSWORD}
      TBANK_DEBUG: ${TBANK_DEBUG}
      TBANK_NOTIFICATION_URL: ${TBANK_NOTIFICATION_URL}
      TBANK_SUCCESS_URL: ${TBANK_SUCCESS_URL}
      TBANK_FAIL_URL: ${TBANK_FAIL_URL}
      TBANK_MERCHANT_NAME: ${TBANK_MERCHANT_NAME}
      TBANK_MERCHANT_ID: ${TBANK_MERCHANT_ID}
      TBANK_TERMINAL_ID: ${TBANK_TERMINAL_ID}
      TBANK_SBP_MERCHANT_ID: ${TBANK_SBP_MERCHANT_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}
    command: >
      sh -c "alembic upgrade head && gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${GUNICORN_WORKERS}
      --timeout ${GUNICORN_TIMEOUT}
      -b 0.0.0.0:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - poputi-backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${API_BASE_PATH}
        VITE_APP_BASE: ${APP_BASE_PATH}/
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - poputi-frontend

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE: ${API_BASE_PATH}
        VITE_ADMIN_BASE: ${ADMIN_BASE_PATH}/
        VITE_PAGINATION_MAX_LINES: ${PAGINATION_MAX_LINES}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - poputi-admin

  nginx:
    build:
      context: ./nginx
    profiles: ["local-gateway"]
    restart: unless-stopped
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH}
      ADMIN_BASE_PATH: ${ADMIN_BASE_PATH}
      API_BASE_PATH: ${API_BASE_PATH}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      admin:
        condition: service_started

volumes:
  postgres_data:

networks:
  gateway:
    name: ${GATEWAY_NETWORK:-gateway-net}
    external: true
